name: Build LeviTracker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK r26b manually
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-r26b" >> $GITHUB_ENV
          echo "$(pwd)/android-ndk-r26b" >> $GITHUB_PATH

      - name: Build
        run: |
          $NDK_HOME/ndk-build NDK_PROJECT_PATH=. \
                    APP_BUILD_SCRIPT=jni/Android.mk \
                    NDK_APPLICATION_MK=jni/Application.mk \
                    -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LeviTracker
          path: libs/arm64-v8a/libLeviTracker.so
